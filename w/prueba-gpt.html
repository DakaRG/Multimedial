        body {
            font-family: Comic, sans-serif;
            background-image: url(img/Fullmontaje2.jpg);
            background-color: #b5853d;
            margin: 0;
        }

        .contenedor {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: auto;
            gap: 20px;
        }
        
        .caja {
            background-color: #fef5dd;
            margin: 20px 0;
            padding: 10px; 
            border-radius: 10px;
            width: calc(25% - 20px);
            cursor: pointer; /* 👈 importante */
        }

        .caja:hover {
            background-color: rgba(222, 154, 36, 0.841);
        }

        .caja img {
            width: 100%;
            height: 300px;
            opacity: 0.3;
        }

        .caja:hover img {
            transition: 0.3s;
            opacity: 1.0;
        }

        /* 🔥 MODAL (imagen ampliada) */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            padding-top: 50px;
            left: 0;
            top: 0;
            width: 80%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal img {
            margin: auto;
            display: block;
            width: 90%;
            max-height: 80%;
        }

        .cerrar {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        .enlaces {
            text-align: right;
            max-width: 700px;
            margin: 50px auto 0 auto;
            font-size: 1.5rem;
            padding: 0 20px;    
        }
    </style>
</head>

<!-- 🔧 JAVASCRIPT -->
<script>
function abrirModal(img) {
    var modal = document.getElementById("miModal");
    var imagenGrande = document.getElementById("imagenGrande");

    modal.style.display = "block";
    imagenGrande.src = img.src;
}

function cerrarModal() {
    document.getElementById("miModal").style.display = "none";
}
</script>
